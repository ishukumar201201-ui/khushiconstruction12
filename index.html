<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vyorate | Premium Experience</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* --- Canvas for Animation --- */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Background mein rahega */
        }

        /* --- Overlay UI --- */
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(0, 0, 0, 0.2); /* halka sa dark overlay */
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #999);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p { font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px; }

        .btn-premium {
            padding: 15px 40px;
            background: #fff;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 50px;
            transition: 0.3s;
            cursor: pointer;
            border: none;
        }

        .btn-premium:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        header {
            position: absolute;
            top: 0; width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 24px; font-weight: 800; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <header>
        <div class="logo">VYORATE</div>
        <div style="display:flex; gap:30px; font-weight: 300;">
            <span>Store</span>
            <span>Repairs</span>
            <span>Login</span>
        </div>
    </header>

    <main class="content">
        <h1>Welcome to Vyorate</h1>
        <p>Premium Mobile & Accessories. Redefined.</p>
        <button class="btn-premium">Explore Collection</button>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // --- 3D Wave Animation Script ---
        const canvas = document.querySelector('#bg-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 5;

        // Create Geometry
        const geometry = new THREE.PlaneGeometry(15, 10, 50, 50);
        const material = new THREE.MeshBasicMaterial({
            color: 0x444444,
            wireframe: true, // Wavy line look dene ke liye
            transparent: true,
            opacity: 0.3
        });
        const mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        mesh.rotation.x = -1;

        // Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            const t = clock.getElapsedTime();
            
            // Verices ko hilane ke liye taki "Wavy" effect aaye
            const { position } = geometry.attributes;
            for (let i = 0; i < position.count; i++) {
                const x = position.getX(i);
                const y = position.getY(i);
                
                // Sin wave logic
                const wave1 = Math.sin(x + t) * 0.5;
                const wave2 = Math.sin(y + t * 0.8) * 0.5;
                
                position.setZ(i, wave1 + wave2);
            }
            position.needsUpdate = true;
            
            mesh.rotation.z = t * 0.05; // Dhire se rotate bhi karega

            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        animate();

        // Responsive handling
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
